<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>단어 복습 프로그램</title>
    <style>
        :root { --red: #ff6b6b; --green: #51cf66; --blue: #007bff; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; overflow: hidden; touch-action: none; transition: background-color 0.2s; }
        
        /* 헤더: 숫자를 길게 눌러야 편집창 등장 */
        .status { font-size: 1.2rem; color: #555; font-weight: bold; margin-bottom: 20px; user-select: none; -webkit-user-select: none; }
        
        #card-container { position: relative; width: 85vw; max-width: 400px; height: 280px; }
        .card { width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid #ddd; text-align: center; padding: 20px; box-sizing: border-box; transition: transform 0.2s, opacity 0.2s; }
        
        /* 뜻 확인 시 스타일 */
        .is-showing-mean { color: var(--blue); border-color: var(--blue); background-color: #f8fbff; }

        .controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        #view-btn { width: 220px; padding: 18px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 50px; background: var(--blue); color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.3); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        
        .guide { display: flex; justify-content: space-between; width: 85vw; max-width: 400px; opacity: 0; transition: opacity 0.3s; font-weight: bold; }
        .guide.visible { opacity: 1; }

        /* 관리자용 모달 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; touch-action: auto; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="status" id="admin-trigger">남은 카드: <span id="count">0</span></div>
    
    <div id="card-container">
        <div class="card" id="main-card">단어</div>
    </div>

    <div class="controls">
        <button id="view-btn">정답 확인하기</button>
        <div class="guide" id="guide-ui">
            <span style="color:var(--red)">⬅️ 헷갈려요</span>
            <span style="color:var(--green)">알아요 ➡️</span>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3>단어 편집 (관리자)</h3>
            <textarea id="bulk-input"></textarea>
            <button onclick="saveData()" style="width:100%; padding:10px; background:var(--blue); color:white; border:none;">저장 후 닫기</button>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('myCards')) || [{word:"Apple", mean:"사과"}];
        let isShowingMean = false;
        let startX = 0;
        let currentX = 0;

        const mainCard = document.getElementById('main-card');
        const viewBtn = document.getElementById('view-btn');
        const countEl = document.getElementById('count');
        const guideUi = document.getElementById('guide-ui');

        function update() {
            localStorage.setItem('myCards', JSON.stringify(cards));
            isShowingMean = false;
            if (cards.length > 0) {
                mainCard.innerText = cards[0].word;
                mainCard.classList.remove('is-showing-mean');
                mainCard.style.transform = "translateX(0)";
                mainCard.style.opacity = "1";
                countEl.innerText = cards.length;
                viewBtn.innerText = "정답 확인하기";
                guideUi.classList.remove('visible');
                document.body.style.backgroundColor = "#f0f2f5";
            } else {
                mainCard.innerText = "🎉 완료!";
                countEl.innerText = 0;
                viewBtn.style.display = "none";
            }
        }

        // 1. 정답 확인 버튼 (가장 확실한 클릭 이벤트)
        viewBtn.addEventListener('click', () => {
            if (cards.length === 0) return;
            isShowingMean = !isShowingMean;
            if (isShowingMean) {
                mainCard.innerText = cards[0].mean; // 즉시 뜻으로 변경
                mainCard.classList.add('is-showing-mean');
                viewBtn.innerText = "단어 다시보기";
                guideUi.classList.add('visible');
            } else {
                mainCard.innerText = cards[0].word; // 즉시 단어로 변경
                mainCard.classList.remove('is-showing-mean');
                viewBtn.innerText = "정답 확인하기";
                guideUi.classList.remove('visible');
            }
        });

        // 2. 스와이프 처리 (뜻을 본 상태에서만 작동)
        mainCard.addEventListener('touchstart', (e) => {
            if (!isShowingMean) return;
            startX = e.touches[0].clientX;
        });

        mainCard.addEventListener('touchmove', (e) => {
            if (!isShowingMean) return;
            currentX = e.touches[0].clientX - startX;
            mainCard.style.transform = `translateX(${currentX}px) rotate(${currentX/15}deg)`;
            
            if (currentX > 50) document.body.style.backgroundColor = "#e6fcf5";
            else if (currentX < -50) document.body.style.backgroundColor = "#fff5f5";
        });

        mainCard.addEventListener('touchend', () => {
            if (!isShowingMean) return;
            if (Math.abs(currentX) > 100) {
                if (currentX > 0) cards.shift(); // 삭제
                else cards.push(cards.shift()); // 유지
                update();
            } else {
                mainCard.style.transform = "translateX(0) rotate(0)";
                document.body.style.backgroundColor = "#f0f2f5";
            }
            currentX = 0;
        });

        // 3. 관리자 모드 (숫자 3초 꾹 누르기)
        let adminTimer;
        const adminTrigger = document.getElementById('admin-trigger');
        adminTrigger.addEventListener('touchstart', () => {
            adminTimer = setTimeout(() => {
                document.getElementById('bulk-input').value = cards.map(c => `${c.word}:${c.mean}`).join('\n');
                document.getElementById('modal').style.display = 'flex';
            }, 3000);
        });
        adminTrigger.addEventListener('touchend', () => clearTimeout(adminTimer));

        function saveData() {
            const lines = document.getElementById('bulk-input').value.split('\n');
            cards = lines.map(l => {
                const p = l.split(':');
                return { word: p[0]?.trim(), mean: p[1]?.trim() };
            }).filter(c => c.word && c.mean);
            update();
            document.getElementById('modal').style.display = 'none';
        }

        update();
    </script>
</body>
</html>
