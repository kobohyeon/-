<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>플래시카드 복습</title>
    <style>
        :root { --red: #ff6b6b; --green: #51cf66; --blue: #007bff; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; overflow: hidden; touch-action: none; transition: background-color 0.3s; }
        
        .status { margin-bottom: 20px; font-size: 1.2rem; color: #555; font-weight: bold; }
        
        /* 카드 및 컨테이너 */
        #card-container { position: relative; width: 85vw; max-width: 400px; height: 280px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid #ddd; text-align: center; padding: 20px; box-sizing: border-box; background: white; }
        .card-back { transform: rotateY(180deg); color: var(--blue); background-color: #f8fbff; border: 2px solid var(--blue); }
        
        /* 스와이프 시 나타나는 텍스트 오버레이 */
        .swipe-label { position: absolute; top: 20px; font-size: 1.5rem; font-weight: bold; padding: 5px 15px; border-radius: 10px; opacity: 0; transition: opacity 0.1s; pointer-events: none; z-index: 10; }
        #label-left { right: 20px; color: var(--red); border: 3px solid var(--red); transform: rotate(15deg); }
        #label-right { left: 20px; color: var(--green); border: 3px solid var(--green); transform: rotate(-15deg); }

        /* 하단 조작 영역 */
        .controls { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        #view-btn { width: 220px; padding: 18px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 50px; background: var(--blue); color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.3); cursor: pointer; }
        
        /* 하단 가이드 가시성 개선 */
        .guide-container { display: flex; justify-content: space-between; width: 85vw; max-width: 400px; opacity: 0; transition: opacity 0.3s; }
        .guide-container.visible { opacity: 1; }
        .guide-item { display: flex; flex-direction: column; align-items: center; font-size: 0.9rem; font-weight: bold; }
        .guide-item.left { color: var(--red); }
        .guide-item.right { color: var(--green); }
        .arrow { font-size: 1.5rem; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="status">남은 카드: <span id="count">0</span></div>
    
    <div id="card-container">
        <div id="label-left" class="swipe-label">다시 공부</div>
        <div id="label-right" class="swipe-label">암기 완료</div>
        
        <div class="card-inner" id="card-inner">
            <div class="card-face card-front" id="front-text">Word</div>
            <div class="card-face card-back" id="back-text">Meaning</div>
        </div>
    </div>

    <div class="controls">
        <button id="view-btn">정답 확인하기</button>
        
        <div class="guide-container" id="guide-container">
            <div class="guide-item left">
                <span class="arrow">⬅️</span>
                <span>모름 (유지)</span>
            </div>
            <div class="guide-item right">
                <span class="arrow">➡️</span>
                <span>앎 (삭제)</span>
            </div>
        </div>
    </div>

    <script>
        let cards = [
            { word: "Metaphor", mean: "은유, 비유" },
            { word: "Consistent", mean: "일관된" },
            { word: "Pedagogy", mean: "교육학" },
            { word: "Efficient", mean: "효율적인" }
        ];

        const cardInner = document.getElementById('card-inner');
        const viewBtn = document.getElementById('view-btn');
        const guideContainer = document.getElementById('guide-container');
        const labelLeft = document.getElementById('label-left');
        const labelRight = document.getElementById('label-right');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const countDisplay = document.getElementById('count');

        let isFlipped = false;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        function updateDisplay() {
            if (cards.length > 0) {
                isFlipped = false;
                cardInner.classList.remove('is-flipped');
                cardInner.style.transform = "rotateY(0deg) translateX(0)";
                cardInner.style.opacity = "1";
                document.body.style.backgroundColor = "#f0f2f5";
                frontText.innerText = cards[0].word;
                backText.innerText = cards[0].mean;
                countDisplay.innerText = cards.length;
                viewBtn.innerText = "정답 확인하기";
                viewBtn.style.visibility = "visible";
                guideContainer.classList.remove('visible');
            } else {
                frontText.innerText = "🎉 완료!";
                backText.innerText = "수고하셨습니다!";
                viewBtn.style.visibility = "hidden";
                guideContainer.classList.remove('visible');
            }
        }

        viewBtn.addEventListener('click', () => {
            isFlipped = !isFlipped;
            if (isFlipped) {
                cardInner.classList.add('is-flipped');
                viewBtn.innerText = "단어 다시보기";
                guideContainer.classList.add('visible');
            } else {
                cardInner.classList.remove('is-flipped');
                viewBtn.innerText = "정답 확인하기";
                guideContainer.classList.remove('visible');
            }
        });

        cardInner.addEventListener('touchstart', (e) => {
            if (!isFlipped) return;
            startX = e.touches[0].clientX;
            isDragging = true;
            cardInner.style.transition = "none";
        });

        cardInner.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX - startX;
            const rotation = currentX / 10;
            cardInner.style.transform = `rotateY(180deg) translateX(${currentX}px) rotateZ(${rotation}deg)`;

            // 실시간 피드백 (배경색 및 라벨)
            if (currentX > 50) { // 오른쪽 (암기완료)
                document.body.style.backgroundColor = "#e6fcf5";
                labelRight.style.opacity = Math.min(currentX / 150, 1);
                labelLeft.style.opacity = 0;
            } else if (currentX < -50) { // 왼쪽 (다시공부)
                document.body.style.backgroundColor = "#fff5f5";
                labelLeft.style.opacity = Math.min(Math.abs(currentX) / 150, 1);
                labelRight.style.opacity = 0;
            } else {
                document.body.style.backgroundColor = "#f0f2f5";
                labelLeft.style.opacity = 0;
                labelRight.style.opacity = 0;
            }
        });

        cardInner.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            cardInner.style.transition = "transform 0.4s ease, opacity 0.3s";
            labelLeft.style.opacity = 0;
            labelRight.style.opacity = 0;

            if (Math.abs(currentX) > 100) {
                if (currentX > 0) { // 오른쪽 (삭제)
                    cardInner.style.transform = "rotateY(180deg) translateX(1000px)";
                    setTimeout(() => { cards.shift(); updateDisplay(); }, 300);
                } else { // 왼쪽 (유지)
                    cardInner.style.transform = "rotateY(180deg) translateX(-1000px)";
                    setTimeout(() => { cards.push(cards.shift()); updateDisplay(); }, 300);
                }
            } else {
                cardInner.style.transform = "rotateY(180deg) translateX(0)";
                document.body.style.backgroundColor = "#f0f2f5";
            }
            currentX = 0;
        });

        updateDisplay();
    </script>
</body>
</html>
