<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>플래시카드 복습</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; overflow: hidden; touch-action: none; }
        .status { margin-bottom: 20px; font-size: 1.2rem; color: #555; font-weight: bold; }
        
        /* 카드 컨테이너 및 3D 설정 */
        #card-container { position: relative; width: 85vw; max-width: 400px; height: 280px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: 1px solid #ddd; text-align: center; padding: 20px; box-sizing: border-box; background: white; }
        
        /* 뒷면 (뜻) */
        .card-back { transform: rotateY(180deg); color: #007bff; background-color: #f8fbff; }
        
        .info { margin-top: 40px; text-align: center; color: #888; font-size: 0.9rem; line-height: 1.6; }
        .hint { margin-top: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="status">남은 카드: <span id="count">0</span></div>
    
    <div id="card-container">
        <div class="card-inner" id="card-inner">
            <div class="card-face card-front" id="front-text">Front</div>
            <div class="card-face card-back" id="back-text">Back</div>
        </div>
    </div>

    <div class="hint" id="guide-text">👆 카드를 터치해서 뜻을 확인하세요</div>

    <div class="info">
        답을 본 후, 카드를 옆으로 밀어보세요!<br>
        ⬅️ 헷갈려요 (유지) | 알아요 (삭제) ➡️
    </div>

    <script>
        // 학습 데이터 (단어, 뜻 분리)
        let cards = [
            { word: "Metaphor", mean: "은유, 비유" },
            { word: "Consistent", mean: "일관된" },
            { word: "Linguistic", mean: "언어의, 언어학의" },
            { word: "Pedagogy", mean: "교육학, 교수법" },
            { word: "Efficient", mean: "효율적인" }
        ];

        const cardInner = document.getElementById('card-inner');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const countDisplay = document.getElementById('count');
        const guideText = document.getElementById('guide-text');

        let isFlipped = false;
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        function updateDisplay() {
            if (cards.length > 0) {
                isFlipped = false;
                cardInner.classList.remove('is-flipped');
                cardInner.style.transform = "rotateY(0deg) translateX(0)";
                cardInner.style.opacity = "1";
                
                frontText.innerText = cards[0].word;
                backText.innerText = cards[0].mean;
                countDisplay.innerText = cards.length;
                guideText.innerText = "👆 카드를 터치해서 뜻을 확인하세요";
            } else {
                frontText.innerText = "🎉 완료!";
                backText.innerText = "수고하셨습니다!";
                countDisplay.innerText = 0;
                guideText.innerText = "모든 카드를 학습했습니다.";
            }
        }

        // 터치/클릭 처리
        cardInner.addEventListener('touchstart', (e) => {
            if (cards.length === 0) return;
            startX = e.touches[0].clientX;
            isDragging = true;
        });

        cardInner.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX - startX;
            
            // 뜻을 확인한(뒤집힌) 상태에서만 스와이프 이동 시각화
            if (isFlipped) {
                const rotation = currentX / 10;
                cardInner.style.transform = `rotateY(180deg) translateX(${currentX}px) rotateZ(${rotation}deg)`;
            }
        });

        cardInner.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;

            // 1. 단순 터치인 경우 (뒤집기)
            if (Math.abs(currentX) < 10) {
                isFlipped = !isFlipped;
                cardInner.classList.toggle('is-flipped');
                guideText.innerText = isFlipped ? "↔️ 옆으로 밀어서 결과 처리" : "👆 다시 누르면 단어가 보여요";
                currentX = 0;
                return;
            }

            // 2. 스와이프 처리 (뒤집힌 상태에서만 작동하도록 권장)
            if (isFlipped) {
                if (currentX > 100) { // 오른쪽: 알아요
                    cardInner.style.transition = "0.4s";
                    cardInner.style.transform = "rotateY(180deg) translateX(1000px)";
                    cardInner.style.opacity = "0";
                    setTimeout(() => {
                        cards.shift();
                        cardInner.style.transition = "none";
                        updateDisplay();
                    }, 400);
                } else if (currentX < -100) { // 왼쪽: 헷갈려요
                    cardInner.style.transition = "0.4s";
                    cardInner.style.transform = "rotateY(180deg) translateX(-1000px)";
                    cardInner.style.opacity = "0";
                    setTimeout(() => {
                        const missed = cards.shift();
                        cards.push(missed);
                        cardInner.style.transition = "none";
                        updateDisplay();
                    }, 400);
                } else {
                    cardInner.style.transform = "rotateY(180deg) translateX(0)";
                }
            } else {
                // 뒤집지 않고 밀었을 때 제자리로
                cardInner.style.transform = "rotateY(0deg) translateX(0)";
            }
            currentX = 0;
        });

        updateDisplay();
    </script>
</body>
</html>
