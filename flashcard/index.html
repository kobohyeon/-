<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>영단어 무한 복습 v3.0</title>
    <style>
        :root { --red: #ff6b6b; --green: #51cf66; --blue: #007bff; --gray: #868e96; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; margin: 0; overflow: hidden; touch-action: none; transition: background-color 0.2s; }
        
        .status { font-size: 1.2rem; color: #555; font-weight: bold; margin-bottom: 20px; user-select: none; }
        
        #card-container { position: relative; width: 85vw; max-width: 450px; height: 320px; }
        .card { position: relative; width: 100%; height: 100%; background: white; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid #ddd; text-align: center; padding: 25px; box-sizing: border-box; transition: transform 0.2s, opacity 0.2s; }
        
        #word-display { font-size: 3rem; font-weight: 800; color: #333; word-break: keep-all; }
        #mean-display { font-size: 1.8rem; font-weight: 700; color: var(--blue); margin-top: 15px; display: none; }

        .swipe-label { position: absolute; font-size: 1.2rem; font-weight: bold; padding: 6px 12px; border-radius: 10px; opacity: 0; z-index: 10; pointer-events: none; }
        #label-left { top: 20px; right: 20px; color: var(--red); border: 2.5px solid var(--red); transform: rotate(15deg); }
        #label-right { top: 20px; left: 20px; color: var(--green); border: 2.5px solid var(--green); transform: rotate(-15deg); }

        .controls { margin-top: 35px; display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        button { width: 240px; padding: 18px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 60px; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        #view-btn { background: var(--blue); color: white; box-shadow: 0 5px 15px rgba(0,123,255,0.3); }
        #reset-btn { background: var(--gray); color: white; display: none; margin-top: 10px; }
        
        .guide { display: flex; justify-content: space-between; width: 85vw; max-width: 450px; opacity: 0; transition: opacity 0.3s; font-weight: bold; font-size: 1rem; }
        .guide.visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="status">남은 카드: <span id="count">0</span> / <span id="total">0</span></div>
    
    <div id="card-container">
        <div id="label-left" class="swipe-label">다시 공부</div>
        <div id="label-right" class="swipe-label">암기 완료</div>
        <div class="card" id="main-card">
            <div id="word-display">준비 중...</div>
            <div id="mean-display">뜻</div>
        </div>
    </div>

    <div class="controls">
        <button id="view-btn">정답 확인하기</button>
        <button id="reset-btn" onclick="location.reload()">처음부터 다시 시작</button>
        <div class="guide" id="guide-ui">
            <span style="color:var(--red)">⬅️ 헷갈려요 (유지)</span>
            <span style="color:var(--green)">알아요 (삭제) ➡️</span>
        </div>
    </div>

    <script>
        // 내장 단어 데이터 (매번 이 데이터로 시작함)
        const MASTER_DATA = [
            {w:"bubble", m:"거품"}, {w:"cafeteria", m:"구내식당"}, {w:"contest", m:"대회, 경연"}, 
            {w:"dust", m:"흙먼지"}, {w:"even", m:"~까지도, ~조차"}, {w:"event", m:"행사"}, 
            {w:"excited", m:"신난, 들뜬"}, {w:"follow", m:"뒤따르다"}, {w:"gym", m:"체육관"}, 
            {w:"lettuce", m:"상추"}, {w:"plant", m:"식물, 심다"}, {w:"poem", m:"시"}, 
            {w:"practice", m:"연습하다"}, {w:"prepare", m:"준비하다"}, {w:"prize", m:"상, 상품"}, 
            {w:"raise", m:"올리다"}, {w:"ride", m:"타다"}, {w:"section", m:"구역"}, 
            {w:"soon", m:"곧, 금방"}, {w:"special", m:"특별한"}, {w:"stage", m:"무대"}, 
            {w:"through", m:"~을 통해"}, {w:"tour", m:"관광"}, {w:"tunnel", m:"터널"}, 
            {w:"rock climbing", m:"암벽 등반"}, {w:"active", m:"활동적인"}, {w:"cartoon", m:"만화"}, 
            {w:"character", m:"등장인물"}, {w:"conversation", m:"대화"}, {w:"creative", m:"창의적인"}, 
            {w:"easily", m:"쉽게"}, {w:"enjoy", m:"즐기다"}, {w:"friendly", m:"친절한"}, 
            {w:"honeybee", m:"꿀벌"}, {w:"horror", m:"공포"}, {w:"interesting", m:"재미있는"}, 
            {w:"liar", m:"거짓말쟁이"}, {w:"patient", m:"참을성 있는"}, {w:"perfect", m:"완벽한"}, 
            {w:"poster", m:"포스터"}, {w:"really", m:"정말로"}, {w:"share", m:"공유하다"}, 
            {w:"smart", m:"똑똑한"}, {w:"subject", m:"과목"}, {w:"sweet", m:"달콤한"}, 
            {w:"thought", m:"생각"}, {w:"turtle", m:"바다거북"}, {w:"a lot", m:"많이"}, 
            {w:"in harmony with", m:"~와 조화하여"}
        ];

        // 핵심: LocalStorage를 사용하지 않고 변수에 바로 할당 (새로고침 시 초기화)
        let cards = [...MASTER_DATA]; 
        let isShowingMean = false;
        let startX = 0;
        let currentX = 0;

        const mainCard = document.getElementById('main-card');
        const wordDisplay = document.getElementById('word-display');
        const meanDisplay = document.getElementById('mean-display');
        const viewBtn = document.getElementById('view-btn');
        const resetBtn = document.getElementById('reset-btn');
        const countEl = document.getElementById('count');
        const totalEl = document.getElementById('total');
        const guideUi = document.getElementById('guide-ui');
        const labelLeft = document.getElementById('label-left');
        const labelRight = document.getElementById('label-right');

        function update() {
            isShowingMean = false;
            if (cards.length > 0) {
                wordDisplay.innerText = cards[0].w;
                meanDisplay.innerText = cards[0].m;
                meanDisplay.style.display = "none";
                mainCard.style.transform = "translateX(0) rotate(0)";
                mainCard.style.opacity = "1";
                mainCard.style.backgroundColor = "white";
                countEl.innerText = cards.length;
                totalEl.innerText = MASTER_DATA.length;
                viewBtn.innerText = "정답 확인하기";
                viewBtn.style.display = "block";
                resetBtn.style.display = "none";
                guideUi.classList.remove('visible');
                document.body.style.backgroundColor = "#f0f2f5";
            } else {
                wordDisplay.innerText = "🎉 학습 완료!";
                meanDisplay.style.display = "none";
                countEl.innerText = 0;
                viewBtn.style.display = "none";
                resetBtn.style.display = "block";
                document.body.style.backgroundColor = "#f0f2f5";
            }
        }

        viewBtn.addEventListener('click', () => {
            if (cards.length === 0) return;
            isShowingMean = !isShowingMean;
            if (isShowingMean) {
                meanDisplay.style.display = "block";
                viewBtn.innerText = "단어만 보기";
                guideUi.classList.add('visible');
            } else {
                meanDisplay.style.display = "none";
                viewBtn.innerText = "정답 확인하기";
                guideUi.classList.remove('visible');
            }
        });

        mainCard.addEventListener('touchstart', (e) => {
            if (!isShowingMean) return;
            startX = e.touches[0].clientX;
            mainCard.style.transition = "none";
        });

        mainCard.addEventListener('touchmove', (e) => {
            if (!isShowingMean) return;
            currentX = e.touches[0].clientX - startX;
            mainCard.style.transform = `translateX(${currentX}px) rotate(${currentX/20}deg)`;
            
            if (currentX > 50) {
                document.body.style.backgroundColor = "#e6fcf5";
                labelRight.style.opacity = Math.min(currentX/150, 1);
            } else if (currentX < -50) {
                document.body.style.backgroundColor = "#fff5f5";
                labelLeft.style.opacity = Math.min(Math.abs(currentX)/150, 1);
            }
        });

        mainCard.addEventListener('touchend', () => {
            if (!isShowingMean) return;
            mainCard.style.transition = "transform 0.4s ease, opacity 0.3s";
            if (Math.abs(currentX) > 130) {
                if (currentX > 0) cards.shift();
                else cards.push(cards.shift());
                update();
            } else {
                mainCard.style.transform = "translateX(0) rotate(0)";
                document.body.style.backgroundColor = "#f0f2f5";
            }
            labelLeft.style.opacity = 0;
            labelRight.style.opacity = 0;
            currentX = 0;
        });

        // 처음 시작 시 무조건 50개 단어로 세팅
        update();
    </script>
</body>
</html>
